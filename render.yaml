# Render deployment config for Syncr backend
services:
  - type: web
    name: Syncr-mern-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_DB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /api/health
